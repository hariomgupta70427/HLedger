name: hledger
description: A smart expense tracking app with AI categorization
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.10.3
  http: ^1.2.0
  google_generative_ai: ^0.4.7
  google_sign_in: ^6.2.1
  google_fonts: ^6.1.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  intl: ^0.20.2
  provider: ^6.1.1
  json_annotation: ^4.9.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/hledger_icon.png"
  min_sdk_android: 21

dependency_overrides:
  sign_in_with_apple: 6.1.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

  # fonts:
